name: CI - Trivy (IaC SARIF)

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  trivy_sarif:
    name: Trivy (SARIF)
    runs-on: ubuntu-latest

    # Needed for SARIF upload (ineffective on fork PRs; we skip upload there)
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy misconfig scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: sarif
          output: trivy.sarif
          exit-code: "0"   # fail job when findings exist (like your tfsec soft_fail: false)

      - name: Upload SARIF to GitHub Code Scanning
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6
        with:
          sarif_file: trivy.sarif
